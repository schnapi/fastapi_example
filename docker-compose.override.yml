services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
      - "5678:5678"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=true

  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  frontend_node_modules:
