auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn
  log_format: json

ingester:
  chunk_idle_period: 3m
  max_chunk_age: 1h
  shutdown_marker_path: /tmp/loki/shutdown-marker
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

distributor:
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/cache
  filesystem:
    directory: /tmp/loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true

memberlist:
  node_name: loki

ruler:
  enable_api: true
  rule_path: /loki/rules-operational
  storage:
    type: local
    local:
      directory: /loki/rules
  poll_interval: 30s
