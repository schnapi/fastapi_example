auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn
  log_format: json

ingester:
  chunk_idle_period: 3m
  max_chunk_age: 1h
  wal:
    enabled: true
    dir: /loki/wal
  shutdown_marker_path: /tmp/loki/shutdown-marker
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    # num_tokens: 128
    # heartbeat_timeout: 15s
    # heartbeat_period: 2s

distributor:
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/cache
  filesystem:
    directory: /tmp/loki/chunks

limits_config:
  allow_structured_metadata: true

compactor:
  compaction_interval: 10m
  working_directory: /tmp/loki/compactor
  retention_enabled: false

memberlist:
  node_name: loki
  retransmit_factor: 4
  dead_node_reclaim_time: 30s

ruler:
  enable_api: true
  rule_path: /loki/rules
  storage:
    type: local
    local:
      directory: /loki/rules
  poll_interval: 30s

frontend:
  log_queries_longer_than: 5s

query_range:
  cache_results: true # enables caching for range queries
  results_cache:
    cache:
      embedded_cache: # defines where cache lives -> in memory
        enabled: true
        max_size_mb: 100
