x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    labels: "com.docker.compose.service"

x-healthcheck-curl: &healthcheck-curl
  interval: 60s
  timeout: 3s
  retries: 3
  start_period: 30s

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
    # - seccomp=default
    # - apparmor=docker-default

services:
  db:
    image: postgres:18.3
    mem_limit: 768m
    cpus: 1.0
    environment:
      PGOPTIONS: >
        -c log_min_messages=warning
        -c log_min_error_statement=warning
    command: >
      postgres
      -c logging_collector=off
      -c log_destination=jsonlog
      -c log_line_prefix=''
    restart: unless-stopped
    logging: *default-logging
    <<: *security-defaults
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]

  api:
    build: .
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    command: >
      sh -c "
      until pg_isready -h db -U $POSTGRES_USER; do
        echo 'Waiting for database...';
        sleep 2;
      done;
      gunicorn -k uvicorn.workers.UvicornWorker app.main:app
      -w ${WEB_CONCURRENCY:-2}
      -b 0.0.0.0:8000
      --proxy-headers --forwarded-allow-ips=\"*\"
      --access-logfile - --error-logfile -"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - internal
      - observability
    logging: *default-logging
    <<: *security-defaults
    cap_drop:
      - ALL
    read_only: true
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - internal
    profiles: ["dev"]
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    working_dir: /app
    logging: *default-logging
    <<: *security-defaults

  prometheus:
    image: prom/prometheus:latest
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --log.level=warn
    networks:
      - observability
    restart: unless-stopped
    logging: *default-logging
    <<: *security-defaults
    cap_drop:
      - ALL

  tempo:
    image: grafana/tempo:2.9.0
    mem_limit: 512m
    cpus: 0.75
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-data:/tempo-data
      - ./tempo-config.yaml:/etc/tempo.yaml
    networks:
      - observability
    depends_on:
      - loki
    logging: *default-logging
    <<: *security-defaults
    cap_drop:
      - ALL

  loki:
    image: grafana/loki:latest
    mem_limit: 1g
    cpus: 1.5
    command: -config.file=/etc/loki-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki-config.yaml
      - ./loki-data/wal:/loki/wal
      - ./loki-data/chunks:/tmp/loki/chunks
      - ./loki-data/cache:/tmp/loki/cache
      - ./loki-data/index:/tmp/loki/index
      - ./loki-data/compactor:/tmp/loki/compactor
    networks:
      - observability
    logging: *default-logging
    <<: *security-defaults
    cap_drop:
      - ALL

  vector:
    image: timberio/vector:0.54.0-alpine
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - nginx_logs:/var/log/nginx:ro
      - vector-data:/var/lib/vector
      - ./vector.toml:/etc/vector/vector.toml:ro
    environment:
      - VECTOR_REQUIRE_HEALTHY=true
    command: ["--config", "/etc/vector/vector.toml"]
    networks:
      - observability
    depends_on:
      - loki
    logging: *default-logging
    <<: *security-defaults

  grafana:
    image: grafana/grafana:latest
    mem_limit: 256m
    cpus: 0.5
    environment:
      GF_LOG_LEVEL: "warn"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - tempo
      - loki
      - prometheus
    volumes:
      - ./grafana.ini:/etc/grafana/grafana.ini
      - grafana_data:/var/lib/grafana
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./provisioning/jsondashboards:/var/lib/grafana/dashboards
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting
    networks:
      - internal
      - observability
    logging: *default-logging
    <<: *security-defaults

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./data/GeoLite2-Country.mmdb:/etc/nginx/GeoLite2-Country.mmdb:ro
      - frontend_dist:/app/frontend:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - internal
      - public
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost/health"]
    logging: *default-logging
    <<: *security-defaults

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    mem_limit: 64m
    cpus: 0.25
    command:
      - -nginx.scrape-uri=http://nginx:80/nginx_status
    depends_on:
      - nginx
    networks:
      - internal
      - observability
    logging: *default-logging
    <<: *security-defaults
    cap_drop:
      - ALL

  docker-api-exporter:
    build:
      context: ./docker_api_exporter
      dockerfile: Dockerfile.exporter
    mem_limit: 128m
    cpus: 0.25
    volumes:
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./app/logging_config.py:/app/logging_config.py:ro
    restart: always
    networks:
      - observability
    logging: *default-logging
    <<: *security-defaults
    cap_drop:
      - ALL
    read_only: true

  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    profiles: ["dev"]
    ports:
      - "8025:8025"
    networks:
      - internal
      - observability
    logging: *default-logging
    <<: *security-defaults

volumes:
  pgdata:
  static_volume:
  media_volume:
  logs_volume:
  frontend_dist:
  frontend_node_modules:
  grafana_data:
  nginx_logs:
  vector-data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
  observability:
    driver: bridge