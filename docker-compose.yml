services:
  db:
    image: postgres:18.3
    environment:
      PGOPTIONS: >
        -c log_min_messages=warning
        -c log_min_error_statement=warning
    command: >
      postgres
      -c logging_collector=off
      -c log_destination=jsonlog
      -c log_line_prefix=''
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    command: >
      sh -c "
      until pg_isready -h db -U $POSTGRES_USER; do
        echo 'Waiting for database...';
        sleep 2;
      done;
      gunicorn -k uvicorn.workers.UvicornWorker app.main:app -w $((2 * $(nproc) + 1)) -b 0.0.0.0:8000 \
      --access-logfile - --error-logfile -"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      loki:
        condition: service_started
    env_file:
      - .env
    networks:
      - internal
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app  # Mount frontend source for building
      - frontend_dist:/app/dist  # Share built files with nginx
    environment:
      - NODE_ENV=production
    networks:
      - internal
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.148.0
    container_name: otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      # - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # - /var/run/docker.sock:/var/run/docker.sock:ro # Allow OTel to see container names
    networks:
      - internal
    depends_on:
      - tempo
      - loki
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # HTTP frontend
    volumes:
      - ./tempo-data:/tempo-data
      - ./tempo-config.yaml:/etc/tempo.yaml
    networks:
      - internal
    depends_on:
      - loki
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki-config.yaml
      - ./loki-data/wal:/wal
      - ./loki-data/chunks:/tmp/loki/chunks
      - ./loki-data/cache:/tmp/loki/cache
      - ./loki-data/index:/tmp/loki/index
      - ./loki-data/compactor:/var/loki
    networks:
      - internal
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - internal
    depends_on:
      - loki
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    environment:
      - GF_LOG_LEVEL=warn
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # - GF_SMTP_ENABLED=true
      # - GF_SMTP_HOST=mailhog:1025
      # - GF_SMTP_FROM_ADDRESS=alerts@example.com
      # - GF_SMTP_FROM_NAME=Grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - alertmanager
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/dashboards:/etc/grafana/dashboards
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    networks:
      - internal
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.29.6
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - frontend_dist:/app/frontend:ro  # Mount frontend build output
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./provisioning/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    depends_on:
      - mailhog
    networks:
      - internal

  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP port for Alertmanager
      - "8025:8025"   # Web UI
    networks:
      - internal

volumes:
  pgdata:
  static_volume:
  media_volume:
  logs_volume:
  frontend_dist:
  grafana_data:
  loki_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
