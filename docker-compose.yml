x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    labels: "com.docker.compose.service"

x-healthcheck-curl: &healthcheck-curl
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  db:
    image: postgres:18.3
    environment:
      PGOPTIONS: >
        -c log_min_messages=warning
        -c log_min_error_statement=warning
    command: >
      postgres
      -c logging_collector=off
      -c log_destination=jsonlog
      -c log_line_prefix=''
    restart: unless-stopped
    logging: *default-logging

    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]

  api:
    build: .
    restart: unless-stopped
    command: >
      sh -c "
      until pg_isready -h db -U $POSTGRES_USER; do
        echo 'Waiting for database...';
        sleep 2;
      done;
      gunicorn -k uvicorn.workers.UvicornWorker app.main:app -w $((2 * $(nproc) + 1)) -b 0.0.0.0:8000 \
      --proxy-headers --forwarded-allow-ips="*" \
      --access-logfile - --error-logfile -"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    profiles: ["dev"]
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    working_dir: /app
    healthcheck:
      test: "exit 0"
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --log.level=warn
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - internal
    restart: unless-stopped
    logging: *default-logging

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
    volumes:
      - ./tempo-data:/tempo-data
      - ./tempo-config.yaml:/etc/tempo.yaml
    networks:
      - internal
    depends_on:
      - loki
    logging: *default-logging
      
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki-config.yaml
      - ./loki-data/wal:/loki/wal
      - ./loki-data/chunks:/tmp/loki/chunks
      - ./loki-data/cache:/tmp/loki/cache
      - ./loki-data/index:/tmp/loki/index
      - ./loki-data/compactor:/tmp/loki/compactor
    networks:
      - internal
    logging: *default-logging

  vector:
    image: timberio/vector:0.54.0-alpine
    container_name: vector
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - nginx_logs:/var/log/nginx:ro
      - vector-data:/var/lib/vector
      - ./vector.toml:/etc/vector/vector.toml:ro
    environment:
      - VECTOR_REQUIRE_HEALTHY=true
    command: ["--config", "/etc/vector/vector.toml"]
    networks:
      - internal
    depends_on:
      - loki
    logging: *default-logging

  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    environment:
      - GF_LOG_LEVEL=warn
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=mailhog:1025
      - GF_SMTP_FROM_NAME=Grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./provisioning/jsondashboards:/var/lib/grafana/dashboards
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting
    networks:
      - internal
    logging: *default-logging

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./data/GeoLite2-Country.mmdb:/etc/nginx/GeoLite2-Country.mmdb:ro
      - frontend_dist:/app/frontend:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging: *default-logging

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    ports:
      - "9113:9113"
    command: >
      -nginx.scrape-uri http://nginx:80/nginx_status
    depends_on:
      - nginx
    networks:
      - internal
    logging: *default-logging

  docker-api-exporter:
    build:
      context: ./docker_api_exporter
      dockerfile: Dockerfile.exporter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./app/logging_config.py:/app/logging_config.py
    ports:
      - "9100:9100"
    restart: always
    networks:
      - internal
    logging: *default-logging
    
  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    container_name: mailhog
    ports:
      - "8025:8025"
    networks:
      - internal
    logging: *default-logging

volumes:
  pgdata:
  static_volume:
  media_volume:
  logs_volume:
  frontend_dist:
  frontend_node_modules:
  grafana_data:
  loki_data:
  nginx_logs:
  vector-data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
