x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-curl: &healthcheck-curl
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  db:
    image: postgres:18.3
    environment:
      PGOPTIONS: >
        -c log_min_messages=warning
        -c log_min_error_statement=warning
    command: >
      postgres
      -c logging_collector=off
      -c log_destination=jsonlog
      -c log_line_prefix=''
    restart: unless-stopped
    logging: *default-logging

    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]

  api:
    build: .
    restart: unless-stopped
    command: >
      sh -c "
      until pg_isready -h db -U $POSTGRES_USER; do
        echo 'Waiting for database...';
        sleep 2;
      done;
      gunicorn -k uvicorn.workers.UvicornWorker app.main:app -w $((2 * $(nproc) + 1)) -b 0.0.0.0:8000 \
      --access-logfile - --error-logfile -"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    environment:
      - NODE_ENV=production
    networks:
      - internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "test", "-f", "/app/dist/index.html"]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - internal
    restart: unless-stopped
    logging: *default-logging

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # HTTP frontend
      - "4317:4317"   # gRPC OTLP receiver
    volumes:
      - ./tempo-data:/tempo-data
      - ./tempo-config.yaml:/etc/tempo.yaml
    networks:
      - internal
    depends_on:
      - loki
    logging: *default-logging
      
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki-config.yaml
      - ./loki-data/wal:/loki/wal
      - ./loki-data/chunks:/tmp/loki/chunks
      - ./loki-data/cache:/tmp/loki/cache
      - ./loki-data/index:/tmp/loki/index
      - ./loki-data/compactor:/tmp/loki/compactor
    networks:
      - internal
    logging: *default-logging

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - internal
    depends_on:
      - loki
    logging: *default-logging

  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    environment:
      - GF_LOG_LEVEL=warn
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=mailhog:1025
      # - GF_SMTP_FROM_ADDRESS=alerts@example.com
      - GF_SMTP_FROM_NAME=Grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./provisioning/jsondashboards:/var/lib/grafana/dashboards
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting
    networks:
      - internal
    logging: *default-logging

  nginx:
    image: nginx:1.29.6
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - frontend_dist:/app/frontend:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - api
      - frontend
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging: *default-logging

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    ports:
      - "9113:9113"
    command: >
      -nginx.scrape-uri http://nginx:80/nginx_status
    depends_on:
      - nginx
    networks:
      - internal

  docker-api-exporter:
    build:
      context: ./docker_api_exporter
      dockerfile: Dockerfile.exporter  # includes docker_api_exporter.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9100:9100"
    restart: always
    networks:
      - internal
    
  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    container_name: mailhog
    ports:
      - "8025:8025"
    networks:
      - internal

volumes:
  pgdata:
  static_volume:
  media_volume:
  logs_volume:
  frontend_dist:
  grafana_data:
  loki_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
