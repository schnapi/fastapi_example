server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn
  log_format: json

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"
      - source_labels: ["__meta_docker_container_id"]
        target_label: "container_id"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_image_name"]
        target_label: "image"
      - source_labels: ["__meta_docker_container_name"]
        regex: "(.*)"
        target_label: "job"
        replacement: "docker/${1}"
    pipeline_stages:
      - match:
          selector: '{service="api"}'
          stages:
            - drop:
                expression: "(GET /metrics|GET /health)"
            - json:
                expressions:
                  timestamp: timestamp
                  level: level
                  logger: logger
                  message: message
                  request_id: request_id
                  method: method
                  endpoint: endpoint
                  status_code: status_code
                  duration: duration
                  client_addr: client_addr
                  country: country
                on_error: keep
            - timestamp:
                source: timestamp
                format: 2006-01-02T15:04:05.000Z07:00
                location: UTC
                on_error: keep
            - labels:
                client_addr: ""
                country: ""
                status_code: ""

  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          __path__: /var/log/nginx/access.json
    pipeline_stages:
      - json:
          expressions:
            remote_addr: remote_addr
            timestamp: timestamp
            country: country
            country_name: country_name
            method: method
            path: path
            status: status
            bytes_sent: bytes_sent
            http_referer: http_referer
            http_user_agent: http_user_agent
            request_time: request_time
            x_forwarded_for: http_x_forwarded_for
          on_error: keep
      - timestamp:
          source: timestamp
          format: 2006-01-02T15:04:05Z07:00
          location: UTC
          on_error: keep
      - labels:
          remote_addr: ""
          country: ""
          country_name: ""
          method: ""
          path: ""
          status: ""
