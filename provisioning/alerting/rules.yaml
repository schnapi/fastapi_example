apiVersion: 1
groups:
  - orgId: 1
    name: API Health Alerts
    folder: alerts
    interval: 1m
    rules:
      - uid: api_error_threshold
        title: "API High Error Count (>5 in 4m)"
        condition: C
        for: 2m
        noDataState: NoData
        execErrState: Alerting
        data:
          # Step A: The Loki Query
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: 'sum(count_over_time({service="api"} |= "ERROR" [4m]))'
              refId: A

          # Step B: The Reduction
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B

          # Step C: The Threshold
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              refId: C
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  type: query

        annotations:
          summary: "Excessive API Errors Detected"
          description: "The API has logged {{ $values.B }} errors in the last 4 minutes. Threshold is 5."
        labels:
          severity: critical
