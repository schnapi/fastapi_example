# tempo.yaml for Tempo v2.10.x

server:
  http_listen_port: 3200 # HTTP query frontend
  grpc_listen_port: 9095 # gRPC / OTLP ingestion
  log_level: warn # Only warn, error, fatal
  log_format: json

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
        http:

storage:
  trace:
    backend: local
    local:
      path: /tempo-data # path inside container or volume mount
