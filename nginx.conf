worker_processes auto;  # Auto-detect number of CPU cores

# Load geoip2 module (must be before http block)
load_module modules/ngx_http_geoip2_module.so;

events {
    worker_connections 4096;  # Optimize for concurrent connections
}

http {
    # Real IP handling (Docker / proxy aware)
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # GeoIP2 database setup
    geoip2 /etc/nginx/GeoLite2-Country.mmdb {
        auto_reload 6h;
        $geoip2_country_code country iso_code;
        $geoip2_country_name country names en;
    }
    default_type application/octet-stream;
    sendfile on;  # Use efficient file serving
    tcp_nopush on;  # Optimize packet transmission
    tcp_nodelay on;  # Reduce latency for interactive content
    keepalive_timeout 65;  # HTTP keep-alive timeout
    server_tokens off;  # Hide nginx version for security

    # Client timeout settings
    client_body_timeout 60s;
    client_header_timeout 60s;
    client_max_body_size 10M;

    # -------------------------------
    # Rate limiting (per IP)
    # -------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;  # Track requests per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

    # -------------------------------
    # Connection limiting (per IP)
    # -------------------------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;  # Track concurrent connections

    # -------------------------------
    # WebSocket support
    # -------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;  # Upgrade header exists → WebSocket
        '' close;         # Otherwise close connection
    }

    # -------------------------------
    # Upstream backend (connection pooling)
    # -------------------------------
    upstream api_backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;  # HTTP keep-alive connections to backend
    }

    # Log format includes country from geoip2
    log_format json escape=json
      '{'
      '"remote_addr":"$remote_addr",'
      '"remote_user":"$remote_user",'
      '"timestamp":"$time_iso8601",'
      '"country":"$geoip2_country_code",'
      '"country_name":"$geoip2_country_name",'
      '"method":"$request_method",'
      '"path":"$request_uri",'
      '"http_version":"$server_protocol",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"http_x_forwarded_for":"$http_x_forwarded_for",'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time"'
      '}';
    access_log /var/log/nginx/access.json json buffer=16k flush=5s;  # Write to file (JSON format)
    error_log /var/log/nginx/error.log warn;  # Error log at warn level

    # -------------------------------
    # Gzip compression (static + JSON)
    # -------------------------------
    gzip on;
    gzip_comp_level 6;  # Compression level (1-9, higher = slower)
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_disable "msie6";  # Disable for IE6

    # -------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------
    server {
        listen 80;
        server_name localhost;  # Replace with domain if available
        return 301 https://$host$request_uri;  # Redirect all HTTP to HTTPS
        # return 301 https://localhost$request_uri;  # Redirect all HTTP to HTTPS
    }

    # -------------------------------
    # Main HTTPS server block
    # -------------------------------
    server {
        listen 443 ssl http2;
        server_name localhost;  # Replace with domain if available

        # SSL certificates (self-signed/mkcert for localhost or real CA for production)
        ssl_certificate /etc/nginx/ssl/localhost.crt;
        ssl_certificate_key /etc/nginx/ssl/localhost.key;

        # Strong SSL/TLS settings (Mozilla intermediate profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        
        # TLS session settings
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP stapling (production only)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/ssl/chain.crt;

        # -------------------------------
        # Security headers
        # -------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
        # -------------------------------
        # Catch-all connection limits
        # -------------------------------
        limit_conn conn_limit 20;  # Max 20 concurrent connections per IP
        
        # Block sensitive files
        # location ~ /\. {
        #     deny all;
        # }

        # -------------------------------
        # Health check endpoint
        # -------------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------
        # API Documentation (Swagger & ReDoc)
        # -------------------------------
        location ~ ^/(docs|redoc|openapi.json)$ {
            # Restrict docs access in production (optional)
            allow 127.0.0.1;
            allow ::1;
            deny all;

            limit_req zone=api_limit burst=20;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # # for external
            # add_header Cache-Control "public, max-age=300, must-revalidate" always;
            # add_header Vary Accept-Encoding always;
            # only for internal docs, disable caching
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Vary Accept-Encoding always;
            # Relaxed CSP for docs
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net unpkg.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data:; frame-ancestors 'none';" always;
        }

        # -------------------------------
        # Admin panel (restricted access)
        # -------------------------------
        location /admin {
            # Restrict to localhost only (change IPs as needed for your network)
            allow 127.0.0.1;
            allow ::1;
            # allow 192.168.1.0/24;  # Uncomment to allow internal network
            deny all;

            # Rate limit admin access (stricter than API)
            limit_req zone=auth_limit burst=10;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Admin panel caching
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # Enhanced security headers for admin
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
            add_header Cache-Control "no-store";
        }

        # -------------------------------
        # API endpoints
        # -------------------------------
        location /api {
            limit_req zone=api_limit burst=30;  # Rate limiting with burst
            limit_req_status 429;               # Return 429 if exceeded

            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Connection management
            proxy_set_header Connection "";  # Disable connection close for keep-alive

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            client_max_body_size 10M;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            add_header Cache-Control "no-store, must-revalidate" always;  # Dynamic API
            add_header Vary Accept-Encoding;  # CDN / gzip compatibility
        }

        # -------------------------------
        # Static assets (CDN cacheable)
        # -------------------------------
        location /static/ {
            alias /app/static/;  # Use alias instead of root with prefix
            expires 1y;  # Browser cache for 1 year
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Vary Accept-Encoding;
            access_log off;  # Skip logging static assets

            # Enable gzip for static files
            gzip on;
            gzip_types text/css application/javascript image/svg+xml application/json;
            gzip_vary on;
            gzip_proxied any;
            gzip_min_length 256;
        }

        # -------------------------------
        # Streaming endpoints (WebSockets / SSE)
        # -------------------------------
        location /stream/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";  # Keep-alive
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;  # Stream immediately
            proxy_read_timeout 3600s;  # Long-running streaming

            # Forward headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend / SPA (production build)
        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
        }
        # -------------------------------
        # Nginx status (LOCKED DOWN)
        # -------------------------------
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;      # Localhost IPv4
            allow ::1;            # Localhost IPv6
            allow 172.19.0.0/16;  # Docker network
            deny all;
        }
    }
}