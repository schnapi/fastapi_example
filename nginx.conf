events {
    worker_connections 4096;  # Optimize for concurrent connections
}

http {
    # -------------------------------
    # Performance settings
    # -------------------------------
    worker_processes auto;  # Auto-detect number of CPU cores
    default_type application/octet-stream;
    charset utf-8;
    sendfile on;  # Use efficient file serving
    tcp_nopush on;  # Optimize packet transmission
    tcp_nodelay on;  # Reduce latency for interactive content
    keepalive_timeout 65;  # HTTP keep-alive timeout
    server_tokens off;  # Hide nginx version for security

    # Client timeout settings
    client_body_timeout 60s;
    client_header_timeout 60s;

    # -------------------------------
    # Rate limiting (per IP)
    # -------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;  # Track requests per IP

    # -------------------------------
    # Connection limiting (per IP)
    # -------------------------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;  # Track concurrent connections

    # -------------------------------
    # WebSocket support
    # -------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;  # Upgrade header exists → WebSocket
        '' close;         # Otherwise close connection
    }

    # -------------------------------
    # Upstream backend (connection pooling)
    # -------------------------------
    upstream api_backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;  # HTTP keep-alive connections to backend
    }

    # -------------------------------
    # Logging setup
    # -------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;  # Buffered access log
    error_log /var/log/nginx/error.log warn;  # Error log at warn level

    # -------------------------------
    # Gzip compression (static + JSON)
    # -------------------------------
    gzip on;
    gzip_comp_level 6;  # Compression level (1-9, higher = slower)
    gzip_types text/css application/javascript application/json image/svg+xml text/html text/plain;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_disable "msie6";  # Disable for IE6

    # -------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------
    server {
        listen 80;
        server_name localhost;  # Replace with domain if available
        return 301 https://$host$request_uri;  # Redirect all HTTP to HTTPS
    }

    # -------------------------------
    # Main HTTPS server block
    # -------------------------------
    server {
        listen 443 ssl http2;
        server_name localhost;  # Replace with domain if available

        # SSL certificates (self-signed/mkcert for localhost or real CA for production)
        ssl_certificate /etc/nginx/ssl/localhost.crt;
        ssl_certificate_key /etc/nginx/ssl/localhost.key;

        # Strong SSL/TLS settings (Mozilla intermediate profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # TLS session settings
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP stapling (production only)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/ssl/chain.crt;

        # -------------------------------
        # Security headers
        # -------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

        # -------------------------------
        # Catch-all connection limits
        # -------------------------------
        limit_conn conn_limit 20;  # Max 20 concurrent connections per IP

        # -------------------------------
        # Health check endpoint
        # -------------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------
        # API endpoints
        # -------------------------------
        location /api {
            limit_req zone=api_limit burst=40;  # Rate limiting with burst
            limit_req_status 429;               # Return 429 if exceeded

            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Connection management
            proxy_set_header Connection "";  # Disable connection close for keep-alive

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            client_max_body_size 10M;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            add_header Cache-Control "no-store, must-revalidate" always;  # Dynamic API
            add_header Vary Accept-Encoding;  # CDN / gzip compatibility
        }

        # -------------------------------
        # Static assets (CDN cacheable)
        # -------------------------------
        location /static/ {
            alias /app/static/;  # Use alias instead of root with prefix
            expires 1y;  # Browser cache for 1 year
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Vary Accept-Encoding;
            access_log off;  # Skip logging static assets

            # Enable gzip for static files
            gzip on;
            gzip_types text/css application/javascript image/svg+xml application/json;
            gzip_vary on;
            gzip_proxied any;
            gzip_min_length 256;
        }

        # -------------------------------
        # Streaming endpoints (WebSockets / SSE)
        # -------------------------------
        location /stream/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";  # Keep-alive
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;  # Stream immediately
            proxy_read_timeout 3600s;  # Long-running streaming
            
            # Forward headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------
        # Frontend / SPA fallback
        # -------------------------------
        location / {
            proxy_pass http://api_backend;  # Serve SPA or fallback frontend
            proxy_http_version 1.1;
            proxy_set_header Connection "";  # Keep-alive

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            add_header Cache-Control "no-cache, must-revalidate" always;  # SPA HTML files
            add_header Vary Accept-Encoding;  # For gzip compatibility
        }
    }
}